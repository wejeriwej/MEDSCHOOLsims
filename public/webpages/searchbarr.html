.box {
    position: relative;
    margin: 10px;
    border-radius: 5px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
}

.box:hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }

.img-box { position: relative; }

.locked img {
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.3s;

}

/* Lock overlay */
.lock-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;

}

.box.locked:hover .lock-overlay {
    opacity: 1;
}

.lock-overlay i {
    font-size: 32px;
    color: rgb(0, 0, 0);
    display: block;
    margin-bottom: 5px;
    animation: pulse 2s infinite;
    backdrop-filter: blur(1px);

}

/* Tooltip */
.lock-overlay .tooltip {
    font-size: 14px;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 5px;
    display: inline-block;
    background: rgba(0,0,0,0.7);
    color: gold;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
}

.box.locked:hover .lock-overlay .tooltip {
    opacity: 1;
    transform: translateY(0);
}

/* Pulse animation for luxury gold */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

      if (userData.plan === "pro" && userData.subscriptionStatus === "active") {
    upgradeStatus.style.display = "block";
    isProUser = true;
        authStatus.style.display = "none";
} else {
    upgradeStatus.style.display = "none";

}

displayItem(categories); // 👈 re-render cases after we know status
