    <title>Contact Us</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fafbff 0%, #f8f9ff 100%);
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
            min-height: 100vh;
        }
        .container {
            width: 72%;
            max-width: 1120px;
            margin: 120px auto 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }
        h2 {
            text-align: center;
            color: #2d3748;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .contact-info {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .contact-info p {
            text-align: left;
            margin: 8px 0;
            line-height: 1.6;
            color: #4a5568;
            font-size: 1.1em;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-top: 15px;
            color: #2d3748;
            font-size: 0.95em;
        }
        #name, #email, textarea {
            width: 100%;
            padding: 12px 16px;
            margin-top: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            font-size: 1em;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        #name:focus, #email:focus, textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            background: white;
        }
        button {
            margin-top: 20px;
            background: #007bff;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.2);
        }
        button:hover {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }
        .social-links {
            text-align: center;
            margin-top: 30px;
        }
        .social-links a {
            margin: 0 15px;
            text-decoration: none;
            font-size: 24px;
            color: #007bff;
            transition: all 0.3s ease;
        }
        .social-links a:hover {
            color: #0056b3;
            transform: translateY(-1px);
        }
        #profilepic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #007bff;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.2);
            transition: all 0.3s ease;
        }
        #profilepic:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 123, 255, 0.3);
        }
        
        /* Dashboard styling */
        #dashboard {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 25px;
            align-items: start;
        }
        
        .feedback-item {
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            border-left: 4px solid #3b82f6;
        }
        
        .feedback-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .feedback-item.expanded {
            grid-column: 1 / -1;
            animation: expandCard 0.4s ease forwards;
            border-left: 4px solid #e2e8f0;
        }

        .feedback-item p,
        .feedback-item li,
        .feedback-item span {
            overflow-wrap: anywhere;
        }
        
        @keyframes expandCard {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 1;
                transform: scale(1.02);
            }
        }
        
        /* Responsive grid */
        @media (max-width: 1100px) {
            #dashboard {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 600px) {
            #dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .feedback-item {
                border-radius: 12px;
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hidden {
            display: none;
        }
        
        /* Loading indicator styles */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.1em;
            color: #6b7280;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .loading-subtext {
            font-size: 0.9em;
            color: #9ca3af;
            font-style: italic;
        }
        
        /* Enhanced responsive design */
        @media (max-width: 768px) {
            .container {
                width: 90%;
                padding: 25px;
                margin: 100px auto 30px auto;
            }
            
            h2 {
                font-size: 2em;
            }
            
            #profilepic {
                width: 120px;
                height: 120px;
            }
        }


@media (max-width: 1200px) {
        .container {
            width: 90%; /* Make container take up more space on smaller screens */
            padding: 20px;
            margin: 20px auto; /* Adjust margin */
        }

        h2 {
            font-size: 1.5em; /* Adjust heading size */
        }

        #dashboard {
            grid-template-columns: 1fr;
        }

        .contact-info p {
            font-size: 14px; /* Adjust font size for smaller screens */
        }

        .contact-form {
            padding: 0 10px; /* Add padding inside the form */
        }

        label {
            font-size: 14px; /* Smaller font for labels */
        }

        #name, #email, textarea {
            padding: 8px;
            font-size: 14px; /* Smaller input field font size */
        }

        button {
            padding: 12px;
            font-size: 14px; /* Adjust button font size */
        }

        .social-links a {
            font-size: 18px; /* Smaller icons on social links */
        }
    }

    /* For very small screens (below 480px) */
    @media (max-width: 480px) {
        h2 {
            font-size: 1.3em; /* Even smaller heading */
        }

        .contact-info p {
            font-size: 12px; /* Smaller text size for very small screens */
        }

        #profilepic {
            width: 80px; /* Make profile pic smaller */
            height: 80px;
        }

        .social-links a {
            font-size: 16px; /* Smaller social icon size */
        }

        button {
            padding: 10px; /* Smaller button padding */
            font-size: 12px; /* Adjust button font size for small screens */
        }
    }
